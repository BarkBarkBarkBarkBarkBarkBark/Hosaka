id: spotify
name: Spotify
category: music
# Flathub publishes com.spotify.Client for x86_64 only; install on aarch64
# (Pi 3B+/4) returns "No remote refs found". Hosaka's install handler
# refuses early when host arch isn't in this list.
arches: [x86_64]
description: >-
  Spotify desktop client wrapped as a Hosaka App. The user signs in with their
  own Spotify account inside the launched app.
provider: Spotify
backend: flatpak
flatpak_id: com.spotify.Client
install:
  command:
    - flatpak
    - install
    - -y
    - flathub
    - com.spotify.Client
launch:
  command:
    - flatpak
    - run
    - com.spotify.Client
aliases:
  - spotify
memory:
  profile: heavy
  warning: Spotify can feel heavy on smaller Hosaka builds.
permissions_notes:
  - Network access is required for playback and account login.
  - Audio playback is handled by the Flatpak app itself.
account_login_required: true
hosaka_manages_credentials: false
notes:
  - Hosaka stores no Spotify credentials.
  - Install and launch stay separate on purpose.
