id: slack
name: Slack
category: chat
description: >-
  Slack desktop client wrapped as a Hosaka App. Note — currently
  x86_64-only on Flathub; on aarch64 (Pi) Hosaka will surface a
  "not available on this architecture" notice.
provider: Slack Technologies
backend: flatpak
flatpak_id: com.slack.Slack
# x86_64 only on Flathub.
arches: [x86_64]
install:
  command:
    - flatpak
    - install
    - -y
    - flathub
    - com.slack.Slack
launch:
  command:
    - flatpak
    - run
    - com.slack.Slack
aliases:
  - slack
memory:
  profile: heavy
  warning: Slack is an Electron app; expect 400-700 MB on a workspace with many channels.
permissions_notes:
  - Network access required.
  - Notifications via Flatpak desktop portal.
account_login_required: true
hosaka_manages_credentials: false
notes:
  - x86_64-only on Flathub today.
