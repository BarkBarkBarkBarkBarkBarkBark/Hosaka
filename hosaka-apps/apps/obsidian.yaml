id: obsidian
name: Obsidian
category: writing
# Flathub currently publishes md.obsidian.Obsidian for x86_64 and aarch64.
# Keep this explicit so the UI can gate cleanly if upstream changes again.
arches: [x86_64, aarch64]
description: >-
  Obsidian markdown vault wrapped as a Hosaka App. The user signs in
  with their own Obsidian account inside the launched window. Hosaka
  treats the on-disk vault under ~/Vault as a future surface for
  agent-authored notes; today the agent writes through /api/v1/docs/*.
provider: Obsidian
backend: flatpak
flatpak_id: md.obsidian.Obsidian
install:
  command:
    - flatpak
    - install
    - -y
    - --noninteractive
    - flathub
    - md.obsidian.Obsidian
# Let Obsidian see the canonical Hosaka vault immediately.
flatpak_overrides:
  - --filesystem=~/Vault:create
launch:
  # Always open onto the canonical vault directory so the operator sees
  # something the moment Obsidian launches. seed-vault.sh creates it.
  command:
    - flatpak
    - run
    - md.obsidian.Obsidian
    - --
    - $HOME/Vault
aliases:
  - obsidian
  - vault
memory:
  profile: heavy
  warning: Obsidian is an Electron app; expect ~250 MB resident.
permissions_notes:
  - Vault lives on local disk under ~/Vault by convention.
  - Sync requires the user's own Obsidian account.
account_login_required: false
hosaka_manages_credentials: false
notes:
  - Future:agent agents may read and append vault notes through a sandbox.
  - Run scripts/seed-vault.sh once to create ~/Vault/welcome.md.
