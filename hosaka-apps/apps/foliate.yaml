id: foliate
name: Foliate
category: reading
description: >-
  Foliate ebook reader wrapped as a Hosaka App for EPUB and local reading
  workflows.
provider: Foliate
backend: flatpak
flatpak_id: com.github.johnfactotum.Foliate
install:
  command:
    - flatpak
    - install
    - -y
    - flathub
    - com.github.johnfactotum.Foliate
# Applied as `flatpak --user override <flatpak_id> <arg>...` once install
# returns 0. Foliate ships with ZERO filesystem access
# (filesystems=xdg-run/speech-dispatcher:ro), so without the override the
# app sees an empty home dir and the seeded epubs at $HOME/Books are
# invisible to its file picker. The override is idempotent.
flatpak_overrides:
  - --filesystem=$HOME/Books
launch:
  # Pass the books directory as a positional arg so foliate opens its
  # "library" view on $HOME/Books instead of the empty welcome screen.
  # Foliate accepts both file and directory paths; a directory triggers a
  # batch-add to the in-app library.
  command:
    - flatpak
    - run
    - com.github.johnfactotum.Foliate
    - $HOME/Books
aliases:
  - foliate
memory:
  profile: medium
  warning: Foliate is lighter than large Electron apps but still uses graphical memory.
permissions_notes:
  - Access to local books depends on the Flatpak app's own file chooser permissions.
  - No Hosaka-managed account is involved.
account_login_required: false
hosaka_manages_credentials: false
notes:
  - Good fit for local EPUB workflows.
  - Install and launch stay separate on purpose.
