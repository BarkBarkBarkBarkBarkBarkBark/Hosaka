name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "hosaka/web/**"
      - "scripts/dump_openapi.py"
      - "scripts/hosakactl"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps (for OpenAPI dump)
        run: |
          python -m pip install --upgrade pip
          # Minimal deps to import hosaka.web.server without its heavy bits.
          pip install fastapi pydantic
          # Project install if a setup is present
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: Install docs deps
        run: pip install -r docs/requirements.txt

      - name: Dump live OpenAPI schema
        run: python scripts/dump_openapi.py docs/openapi.json

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
