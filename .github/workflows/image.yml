name: image

# Publish multi-arch container images for the Hosaka client.
#
# Triggers:
#   - push to main              → :main  + :edge
#   - push of a v* tag          → :vX.Y.Z + :latest
#   - manual run                → whatever SHA you kick it off against
#
# Consumers (hosaka launcher) pull ghcr.io/<owner>/hosaka:latest by
# default, so the "latest" tag only moves when you cut a real tag — not
# on every push to main.

on:
  push:
    branches: [main]
    tags:     ["v*"]
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lower-case owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/hosaka
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=Hosaka
            org.opencontainers.image.description=Hosaka Field Terminal — client container
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HOSAKA_COMMIT=${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Smoke test — ui_built
        run: |
          # Load the image that was just built (single-platform, for speed)
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --build-arg HOSAKA_COMMIT=${{ github.sha }} \
            -t hosaka:smoke \
            -f docker/Dockerfile \
            .
          # Run it detached, wait for the web server, then check /api/health
          docker run -d --name hosaka-smoke -p 18421:8421 hosaka:smoke
          for i in $(seq 1 20); do
            sleep 3
            STATUS=$(curl -sf http://localhost:18421/api/health || true)
            if [ -n "$STATUS" ]; then break; fi
          done
          docker stop hosaka-smoke && docker rm hosaka-smoke
          echo "Health response: $STATUS"
          if [ -z "$STATUS" ]; then
            echo "::error::Container did not respond to /api/health" && exit 1
          fi
          UI=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ui_built','false'))")
          if [ "$UI" != "True" ]; then
            echo "::error::ui_built is not True — frontend was not bundled into the image" && exit 1
          fi
          echo "ui_built=True — smoke test passed"

      - name: Summary
        run: |
          {
            echo "### hosaka image published"
            echo ""
            echo "Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
