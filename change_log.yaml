known_irregularities:

  - id: IR-001
    title: "HOSAKA_PUBLIC_MODE not enforced on inline terminal LLM config flow"
    severity: medium
    description: |
      When HOSAKA_PUBLIC_MODE=1, the settings drawer is correctly hidden.
      However, the inline LLM config flow in HosakaShell.ts is triggered on the
      first printable keystroke if llmConfigured=false, regardless of public mode.
      A stranger on the web instance could type a character and be walked through
      the LLM config prompt — potentially setting/overwriting the API key or
      provider for all users of that instance.
    workaround: |
      Ensure the web-deployed instance always has an LLM backend configured before
      going public. If the backend is configured (llmConfigured=true), the inline
      prompt never fires.
    recommended_fix: |
      In HosakaShell.ts checkLlmConfig(), also fetch /api/health and check
      settings_enabled. If false, set this.llmPrompted = true to permanently
      skip the inline config flow. This would fully unify the public-mode access
      control across both entry points.
    tracking_commit: "2a163ba (see caveats)"

  - id: IR-002
    title: "CI :latest was never pushed on main commits before 2026-04-23"
    severity: high
    description: |
      From the initial introduction of the CI pipeline until commit 7497608,
      every push to main published :main, :edge, :sha-<hash> tags but NOT :latest.
      Any user who ran `hosaka update` (which pulls :latest) received a stale image.
      The bug was silent — hosaka update reported success (docker pull succeeded)
      but pulled an unchanged image. This affected all installs done via the
      one-line installer that use `hosaka update` for upgrades.
    resolved_by: "7497608"

  - id: IR-003
    title: "SHOW_SETTINGS bare variable — deleted declaration, kept reference"
    severity: critical
    description: |
      At some point in a session before 2026-04-23, the `const SHOW_SETTINGS = ...`
      declaration was removed from App.tsx but the references in JSX were not removed.
      Vite/esbuild does not warn on bare undeclared identifiers in JSX expressions —
      it emits the name literally into the minified bundle. At runtime the browser
      throws ReferenceError which crashes the React tree before first paint.
      The splash screen fades (MutationObserver fires on the first React mount attempt)
      then the page goes black. No error is visible to the user; DevTools console is
      required to see the ReferenceError.
    resolved_by: "2a163ba"
    detection_method: |
      Pull the running container's Vite asset file URL from the browser (Network tab
      or view-source), curl it, grep for SHOW_SETTINGS. If the bare name appears in
      the bundle without a preceding assignment, the var is undeclared.

  - id: IR-004
    title: "HOSAKA_PUBLIC_MODE env var name — not HOSAKA_PUBLIC_NODE"
    severity: low
    description: |
      The environment variable controlling public/web deployment mode is named
      HOSAKA_PUBLIC_MODE. It has been referred to as HOSAKA_PUBLIC_NODE (typo)
      in conversation. The correct name is HOSAKA_PUBLIC_MODE. If you search the
      codebase for PUBLIC_NODE you will find nothing — use PUBLIC_MODE.
    files_to_check:
      - "hosaka/web/server.py: os.environ.get('HOSAKA_PUBLIC_MODE', '')"
      - "README.md: Configuration > System settings table"
      - "change_log.yaml: entries[0].commit = 2a163ba"
