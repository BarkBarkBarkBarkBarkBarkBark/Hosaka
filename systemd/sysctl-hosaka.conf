# /etc/sysctl.d/60-hosaka.conf — Pi 3B / SD-card swap tuning.
#
# The default vm.swappiness=60 happily uses SD-card swap as a working
# surface, which causes mmc_rescan deadlocks under sustained pressure.
# Drop it to 10 so swap is the last resort, not the first.
#
# vfs_cache_pressure=50 keeps inode/dentry caches around longer (helps
# Chromium and Vite startup), at the cost of slightly more RAM held by
# the kernel. On a 1 GiB box this trades fine.
#
# overcommit_memory=1 lets fork()+exec from a large parent (npm spawning
# a build worker) succeed without the kernel pre-reserving 2× the parent
# RSS — a frequent cause of "Cannot allocate memory" under our profile.

vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.overcommit_memory = 1
