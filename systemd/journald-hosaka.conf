# Hosaka journald overrides. Install at:
#   /etc/systemd/journald.conf.d/hosaka.conf
#
# Persistent storage with hard size caps so we never blow up the SD card.
# 64 MiB total, 8 MiB per file. Rate-limit to one OOM-storm-worth of lines
# so a runaway daemon can't drown the journal.

[Journal]
Storage=persistent
Compress=yes
SystemMaxUse=64M
SystemMaxFileSize=8M
SystemKeepFree=128M
RateLimitIntervalSec=30s
RateLimitBurst=5000
ForwardToSyslog=no
